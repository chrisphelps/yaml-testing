defaults:
  roleName: CloudWatchLogsRole

awsRegions:
  - us-east-1
  - us-west-2
  - eu-west-1
  - ap-southeast-1

awsNamespaces:
  - AWS/Lambda
  - AWS/EC2
  - AWS/S3
  - AWS/DynamoDB

accounts:
  "123456789012":
    namespaces: [AWS/EC2]
    regions: [us-west-2]
  "234567890123":
    namespaces: [AWS/Lambda]
    regions: [us-west-2]
  "345678901234":
    namespaces: [AWS/EC2]
    regions: [eu-west-1]
