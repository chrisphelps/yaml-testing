$schema: "https://json-schema.org/draft/07/schema"
title: enrichment_v2.yaml
type: object
required:
  - defaults
  - teams
additionalProperties: false

definitions:
  awsRegion:
    type: string
    pattern: "^[a-z]{2}-[a-z]+-\\d+$"

  awsNamespace:
    type: string
    pattern: "^[A-Za-z0-9][A-Za-z0-9/_-]*$"

  roleName:
    type: string
    pattern: "^[\\w+=,.@/-]+$"

properties:
  defaults:
    type: object
    required:
      - roleName
    additionalProperties: false
    properties:
      roleName:
        $ref: "#/definitions/roleName"

  teams:
    type: array
    minItems: 1
    items:
      type: object
      required:
        - name
        - namespaces
        - accounts
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
        namespaces:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: "#/definitions/awsNamespace"
        roleName:
          $ref: "#/definitions/roleName"
        accounts:
          type: object
          minProperties: 1
          additionalProperties: false
          patternProperties:
            "^\\d{12}$":
              type: object
              required:
                - regions
              additionalProperties: false
              properties:
                regions:
                  type: array
                  minItems: 1
                  uniqueItems: true
                  items:
                    $ref: "#/definitions/awsRegion"
