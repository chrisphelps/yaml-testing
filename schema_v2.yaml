$schema: "https://json-schema.org/draft/07/schema"
title: enrichment_v2.yaml
type: object
required:
  - defaults
  - awsRegions
  - awsNamespaces
  - accounts
additionalProperties: false

definitions:
  awsRegion:
    type: string
    pattern: "^[a-z]{2}-[a-z]+-\\d+$"

  awsNamespace:
    type: string
    pattern: "^[A-Za-z0-9][A-Za-z0-9/_-]*$"

  accountId:
    type: string
    pattern: "^\\d{12}$"

  roleName:
    type: string
    pattern: "^[\\w+=,.@/-]+$"

properties:
  defaults:
    type: object
    required:
      - roleName
    additionalProperties: false
    properties:
      roleName:
        $ref: "#/definitions/roleName"

  awsRegions:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      $ref: "#/definitions/awsRegion"

  awsNamespaces:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      $ref: "#/definitions/awsNamespace"

  accounts:
    type: object
    minProperties: 1
    additionalProperties: false
    patternProperties:
      "^\\d{12}$":
        type: object
        required:
          - namespaces
          - regions
        additionalProperties: false
        properties:
          roleName:
            $ref: "#/definitions/roleName"
          namespaces:
            type: array
            minItems: 1
            uniqueItems: true
            items:
              $ref: "#/definitions/awsNamespace"
          regions:
            type: array
            minItems: 1
            uniqueItems: true
            items:
              $ref: "#/definitions/awsRegion"
